name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          coverage: none

      # 3. Проверяем, валиден ли composer.json
      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      # 4. Кешируем зависимости для ускорения будущих сборок (опционально, но полезно)
      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      # 5. Устанавливаем зависимости
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # 6. Запускаем сами тесты
      - name: Run test suite
        run: vendor/bin/phpunit # Или `vendor/bin/pest`, если используете Pest